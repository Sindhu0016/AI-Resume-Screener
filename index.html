<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <header class="card-header">
        <h1>Student Registration</h1>
        <p>Fill in your details below to register as a student.</p>
      </header>

      <form id="studentForm" novalidate>
        <fieldset>
          <legend>Personal Information</legend>
          <div class="grid two-col">
            <div class="field">
              <label for="firstName">First Name <span class="required">*</span></label>
              <input type="text" id="firstName" name="firstName" required autocomplete="given-name" />
              <span class="error" data-for="firstName"></span>
            </div>
            <div class="field">
              <label for="lastName">Last Name <span class="required">*</span></label>
              <input type="text" id="lastName" name="lastName" required autocomplete="family-name" />
              <span class="error" data-for="lastName"></span>
            </div>
          </div>

          <div class="grid two-col">
            <div class="field">
              <label for="dob">Date of Birth <span class="required">*</span></label>
              <input type="date" id="dob" name="dob" required />
              <span class="error" data-for="dob"></span>
            </div>
            <div class="field">
              <label for="gender">Gender</label>
              <select id="gender" name="gender">
                <option value="">Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
                <option value="prefer-not">Prefer not to say</option>
              </select>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Contact Details</legend>
          <div class="grid two-col">
            <div class="field">
              <label for="email">Email <span class="required">*</span></label>
              <input type="email" id="email" name="email" required autocomplete="email" />
              <span class="error" data-for="email"></span>
            </div>
            <div class="field">
              <label for="phone">Phone Number <span class="required">*</span></label>
              <input type="tel" id="phone" name="phone" required autocomplete="tel" placeholder="+1 555 123 4567" />
              <span class="error" data-for="phone"></span>
            </div>
          </div>

          <div class="field">
            <label for="address">Address</label>
            <textarea id="address" name="address" rows="3" autocomplete="street-address"></textarea>
          </div>
        </fieldset>

        <fieldset>
          <legend>Academic Information</legend>
          <div class="grid two-col">
            <div class="field">
              <label for="studentId">Student ID <span class="required">*</span></label>
              <input type="text" id="studentId" name="studentId" required placeholder="e.g. STU-2026-001" />
              <span class="error" data-for="studentId"></span>
            </div>
            <div class="field">
              <label for="university">University / College <span class="required">*</span></label>
              <input type="text" id="university" name="university" required />
              <span class="error" data-for="university"></span>
            </div>
          </div>

          <div class="grid two-col">
            <div class="field">
              <label for="course">Course / Major <span class="required">*</span></label>
              <input type="text" id="course" name="course" required placeholder="e.g. Computer Science" />
              <span class="error" data-for="course"></span>
            </div>
            <div class="field">
              <label for="year">Year of Study <span class="required">*</span></label>
              <select id="year" name="year" required>
                <option value="">Select year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
                <option value="graduate">Graduate</option>
              </select>
              <span class="error" data-for="year"></span>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Resume (Optional)</legend>
          <div class="field">
            <label for="resume">Upload Resume</label>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" />
            <span class="hint">Accepted formats: PDF, DOC, DOCX (max 5 MB)</span>
            <span class="error" data-for="resume"></span>
          </div>
        </fieldset>

        <div class="actions">
          <button type="reset" class="btn btn-secondary">Clear</button>
          <button type="submit" class="btn btn-primary">Submit Registration</button>
        </div>
      </form>

      <div id="successMessage" class="success-message hidden" role="status">
        <h2>Registration Submitted!</h2>
        <p>Your student details have been recorded successfully.</p>
        <pre id="submittedData"></pre>
        <button type="button" id="newFormBtn" class="btn btn-primary">Submit Another</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
